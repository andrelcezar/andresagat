<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog & Novidades — André Sagat Muaythai GYM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --gold:#D4A017; --gold-light:#F0C040; --gold-dark:#9A7010;
    --black:#0a0a0a; --dark:#111111; --dark2:#1a1a1a; --dark3:#222222;
    --text:#e8e0d0; --text-muted:#888880;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--black)}
  ::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,160,23,0.2);padding:0 2rem;height:70px;display:flex;align-items:center;justify-content:space-between;transition:border-color .3s}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
  .nav-logo img{height:44px;filter:drop-shadow(0 0 8px rgba(212,160,23,.4))}
  .nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:2px;line-height:1.1}
  .nav-brand span{display:block;font-size:.7rem;letter-spacing:4px;color:var(--text-muted);font-family:'Oswald',sans-serif;font-weight:300}
  .nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center}
  .nav-links a{color:var(--text-muted);text-decoration:none;font-family:'Oswald',sans-serif;font-weight:400;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;transition:color .3s}
  .nav-links a:hover,.nav-links a.active{color:var(--gold)}
  .nav-cta{background:var(--gold)!important;color:var(--black)!important;padding:8px 20px;border-radius:2px;font-weight:600!important;display:inline-flex!important;align-items:center;gap:6px}
  .nav-cta:hover{background:var(--gold-light)!important}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
  .hamburger span{width:24px;height:2px;background:var(--gold)}

  /* HERO */
  .hero{padding:140px 2rem 80px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(212,160,23,.07) 0%,transparent 65%),linear-gradient(180deg,#0a0a0a 0%,#111 100%);text-align:center;border-bottom:1px solid rgba(212,160,23,.12);position:relative;overflow:hidden}
  .hero-texture{position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23D4A017' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
  .hero-content{position:relative;z-index:2}
  .hero-eyebrow{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:5px;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.25rem}
  .hero-eyebrow::before,.hero-eyebrow::after{content:'';width:40px;height:1px;background:rgba(212,160,23,.4)}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.5rem);color:#fff;line-height:.92;margin-bottom:1.25rem}
  .hero-title .gold{color:var(--gold)}
  .hero-title .outline{-webkit-text-stroke:2px var(--gold);color:transparent}
  .hero-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--gold),transparent);margin:0 auto 1.5rem}
  .hero-desc{color:var(--text-muted);font-size:1rem;max-width:460px;margin:0 auto 2.5rem;line-height:1.75}

  /* FILTER */
  .filter-bar{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
  .filter-btn{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;padding:9px 22px;border:1px solid rgba(212,160,23,.25);color:var(--text-muted);background:transparent;cursor:pointer;border-radius:2px;transition:all .25s;display:flex;align-items:center;gap:7px}
  .filter-btn:hover{border-color:var(--gold);color:var(--gold)}
  .filter-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);font-weight:700}

  /* LAYOUT */
  .container{max-width:1200px;margin:0 auto;padding:0 2rem}
  .blog-section{padding:5rem 2rem}
  .blog-section.alt{background:var(--dark)}

  /* BLOCK HEADER */
  .block-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem}
  .block-header::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(212,160,23,.35),transparent)}
  .block-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:3px;display:flex;align-items:center;gap:10px;white-space:nowrap}
  .block-count{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:2px;color:var(--gold);background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);padding:3px 10px}

  /* GRID */
  .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}

  /* CARD */
  .card{background:var(--dark2);border:1px solid rgba(212,160,23,.12);border-radius:4px;overflow:hidden;transition:all .3s;position:relative;display:flex;flex-direction:column}
  .card:hover{border-color:rgba(212,160,23,.45);transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,.55)}
  .card.fight{border-color:rgba(212,160,23,.3)}
  .card.fight:hover{border-color:var(--gold);box-shadow:0 14px 45px rgba(212,160,23,.18)}

  /* Card image */
  .card-img-wrap{position:relative;overflow:hidden;flex-shrink:0}
  .card-img{width:100%;object-fit:cover;object-position:center top;display:block;transition:all .45s;filter:brightness(.82)}
  .card:hover .card-img{filter:brightness(.95);transform:scale(1.04)}
  .card-img.tall{height:280px}
  .card-img.normal{height:200px}
  .card-ph{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#111 0%,#1c1a10 50%,#111 100%)}
  .card-ph.tall{height:280px}
  .card-ph.normal{height:200px}
  .card-ph .fa{font-size:3rem;color:rgba(212,160,23,.15)}

  /* Card badge */
  .card-badge{position:absolute;top:12px;left:12px;z-index:5;font-family:'Bebas Neue',sans-serif;font-size:.72rem;letter-spacing:2px;padding:5px 13px;display:flex;align-items:center;gap:5px;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px))}
  .badge-evento{background:var(--gold);color:var(--black)}
  .badge-fight{background:var(--gold);color:var(--black)}
  .badge-novidade{background:rgba(20,40,70,.92);color:#7eb8f0;border:1px solid rgba(126,184,240,.5);clip-path:none;border-radius:2px}

  /* Card body */
  .card-body{padding:1.25rem 1.5rem 1.5rem;display:flex;flex-direction:column;flex:1}
  .card-date{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:.6rem}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#fff;letter-spacing:1px;line-height:1.15;margin-bottom:.6rem}
  .card-excerpt{font-size:.85rem;color:var(--text-muted);line-height:1.65;flex:1;margin-bottom:.75rem}
  .card-local{font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin-top:.35rem}
  .card-local .fa{color:var(--gold)}
  .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:1rem}
  .card-tag{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:1.5px;color:var(--text-muted);border:1px solid rgba(212,160,23,.2);padding:3px 9px;border-radius:2px;display:flex;align-items:center;gap:4px}
  .card-tag .fa{color:var(--gold);font-size:.58rem}

  /* Empty */
  .empty{grid-column:1/-1;text-align:center;padding:4rem 1rem}
  .empty .fa{font-size:3rem;color:rgba(212,160,23,.15);display:block;margin-bottom:1rem}
  .empty p{font-family:'Oswald',sans-serif;font-size:.82rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}

  /* Divider */
  .gold-stripe{height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35}

  /* FOOTER */
  footer{background:var(--dark);border-top:1px solid rgba(212,160,23,.15);padding:3rem 2rem}
  .footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem}
  .footer-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
  .footer-brand img{height:44px;filter:drop-shadow(0 0 8px rgba(212,160,23,.3))}
  .footer-brand-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:2px}
  .footer-brand-sub{font-size:.7rem;color:var(--text-muted);font-family:'Oswald',sans-serif;letter-spacing:3px}
  .footer-copy{color:var(--text-muted);font-size:.78rem;text-align:center;line-height:1.7}
  .footer-back{color:var(--gold);text-decoration:none;font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;transition:color .3s}
  .footer-back:hover{color:var(--gold-light)}

  /* SCROLL TOP */
  .scroll-top{position:fixed;bottom:2rem;right:2rem;width:46px;height:46px;background:var(--gold);color:var(--black);border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;transition:opacity .3s;clip-path:polygon(0 10px,10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .scroll-top.visible{opacity:1}
  .scroll-top:hover{background:var(--gold-light)}

  /* FADE IN */
  .fade-in{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
  .fade-in.visible{opacity:1;transform:translateY(0)}

  @media(max-width:1024px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:768px){
    .hamburger{display:flex}
    .nav-links{display:none}
    .nav-links.open{display:flex;flex-direction:column;position:fixed;top:70px;left:0;right:0;background:rgba(10,10,10,.98);padding:2rem;gap:1.5rem;border-bottom:1px solid rgba(212,160,23,.2);z-index:999}
    .cards-grid{grid-template-columns:1fr}
    .footer-inner{flex-direction:column;align-items:center;text-align:center}
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="logo_new.png" alt="André Sagat" onerror="this.src='https://andrelcezar.github.io/andresagat/assets/logo01.png'">
    <div class="nav-brand">André Sagat <span>Muaythai Gym</span></div>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#horarios">Horários</a></li>
    <li><a href="index.html#pricing">Planos</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="index.html#contact" class="nav-cta"><i class="fa-solid fa-dumbbell"></i> Matricule-se</a></li>
  </ul>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-texture"></div>
  <div class="hero-content">
    <div class="hero-eyebrow"><i class="fa-solid fa-rss"></i> Agenda &amp; Novidades</div>
    <h1 class="hero-title">
      BLOG<br>
      <span class="gold">SAGAT</span><br>
      <span class="outline">GYM</span>
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-desc">Acompanhe os eventos, fight cards e novidades da academia.</p>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="applyFilter('all',this)">
        <i class="fa-solid fa-border-all"></i> Todos
      </button>
      <button class="filter-btn" onclick="applyFilter('evento',this)">
        <i class="fa-solid fa-fist-raised"></i> Eventos
      </button>
      <button class="filter-btn" onclick="applyFilter('novidade',this)">
        <i class="fa-solid fa-bell"></i> Novidades
      </button>
    </div>
  </div>
</div>

<!-- EVENTOS -->
<section class="blog-section alt" id="sec-eventos">
  <div class="container">
    <div class="block-header">
      <span class="block-title">
        <i class="fa-solid fa-fist-raised"></i> Eventos
        <span class="block-count" id="cnt-eventos">0</span>
      </span>
    </div>
    <div class="cards-grid" id="grid-eventos"></div>
  </div>
</section>

<div class="gold-stripe"></div>

<!-- NOVIDADES -->
<section class="blog-section" id="sec-novidades">
  <div class="container">
    <div class="block-header">
      <span class="block-title">
        <i class="fa-solid fa-bell"></i> Novidades
        <span class="block-count" id="cnt-novidades">0</span>
      </span>
    </div>
    <div class="cards-grid" id="grid-novidades"></div>
  </div>
</section>

<div class="gold-stripe"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-brand">
      <img src="logo_new.png" alt="André Sagat" onerror="this.src='https://andrelcezar.github.io/andresagat/assets/logo01.png'">
      <div>
        <div class="footer-brand-name">ANDRÉ SAGAT</div>
        <div class="footer-brand-sub">Muaythai GYM</div>
      </div>
    </a>
    <div class="footer-copy">
      <i class="fa-regular fa-copyright"></i> 2025 André Sagat Muaythai GYM<br>
      <span style="color:var(--gold-dark);font-size:.7rem;"><i class="fa-solid fa-certificate"></i> Filiado à CBMT / BT</span>
    </div>
    <a href="index.html" class="footer-back"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a>
  </div>
</footer>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fa-solid fa-chevron-up"></i>
</button>

<script>
// ── Data source: same localStorage key used by the admin ──
const STORAGE_KEY = 'sagat_blog_posts';

function getPosts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
}

// ── Build card ────────────────────────────────────────────
function buildCard(p) {
  const isFight  = !!(p.isFight && p.type === 'evento');
  const isEvento = p.type === 'evento';
  const szClass  = isFight ? 'tall' : 'normal';
  const dateStr  = isEvento && p.eventDate ? fmtDate(p.eventDate) : fmtDate(p.createdAt);

  const badge = isFight
    ? `<span class="card-badge badge-fight"><i class="fa-solid fa-trophy"></i> Fight Card</span>`
    : isEvento
      ? `<span class="card-badge badge-evento"><i class="fa-solid fa-calendar-star"></i> Evento</span>`
      : `<span class="card-badge badge-novidade"><i class="fa-solid fa-bell"></i> Novidade</span>`;

  const imgHtml = p.image
    ? `<img src="${p.image}" class="card-img ${szClass}" alt="${p.title}">`
    : `<div class="card-ph ${szClass}"><i class="fa-solid fa-${isEvento?'fist-raised':'bell'}"></i></div>`;

  const localHtml = p.local
    ? `<div class="card-local"><i class="fa-solid fa-location-dot"></i> ${p.local}</div>` : '';

  const excerptHtml = p.excerpt
    ? `<div class="card-excerpt">${p.excerpt}</div>` : '';

  const tagsHtml = p.tags && p.tags.length
    ? `<div class="card-tags">${p.tags.map(t=>
        `<span class="card-tag"><i class="fa-solid fa-hashtag"></i>${t}</span>`
      ).join('')}</div>` : '';

  return `
    <div class="card ${isFight?'fight':''} fade-in">
      <div class="card-img-wrap">
        ${imgHtml}
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-date"><i class="fa-solid fa-calendar"></i>${dateStr}</div>
        <div class="card-title">${p.title}</div>
        ${excerptHtml}
        ${localHtml}
        ${tagsHtml}
      </div>
    </div>`;
}

function emptyState(icon, msg) {
  return `<div class="empty"><i class="fa-solid fa-${icon}"></i><p>${msg}</p></div>`;
}

// ── Render both grids ─────────────────────────────────────
function render() {
  const all       = getPosts();
  const eventos   = all.filter(p => p.type === 'evento');
  const novidades = all.filter(p => p.type === 'novidade');

  document.getElementById('cnt-eventos').textContent   = eventos.length;
  document.getElementById('cnt-novidades').textContent = novidades.length;

  document.getElementById('grid-eventos').innerHTML = eventos.length
    ? eventos.map(buildCard).join('')
    : emptyState('calendar-xmark','Nenhum evento publicado ainda');

  document.getElementById('grid-novidades').innerHTML = novidades.length
    ? novidades.map(buildCard).join('')
    : emptyState('bell-slash','Nenhuma novidade publicada ainda');

  // Trigger fade-in after paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.fade-in').forEach((el,i) => {
      setTimeout(() => el.classList.add('visible'), i * 60);
    });
  });
}

// ── Filter ────────────────────────────────────────────────
let curFilter = 'all';
function applyFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sE = document.getElementById('sec-eventos');
  const sN = document.getElementById('sec-novidades');
  sE.style.display = (f === 'all' || f === 'evento')   ? '' : 'none';
  sN.style.display = (f === 'all' || f === 'novidade') ? '' : 'none';
}

// ── Scroll ────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300);
  document.getElementById('navbar').style.borderBottomColor =
    window.scrollY > 10 ? 'rgba(212,160,23,0.35)' : 'rgba(212,160,23,0.2)';
});

// ── Init ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
